                        stunning natural landscapes, volcanoes,

                        and its biggest coastal city. It is famous for
                        beautiful beaches, fresh fish markets, 
                        and scenic nature. Popular attractions include Haeundae
                        Beach, Jalgachi Market, and Haedong Yonggungsa Temple.
